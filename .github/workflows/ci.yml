name: Full-Stack CI Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # STAGE 1: Verify Backend Architecture
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Tooling
        run: |
          cd backend
          npm install

      - name: Run Jest Testing Suite
        run: |
          cd backend
          npm test

  # STAGE 2: Verify Frontend Architecture
  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Tooling
        run: |
          cd frontend
          npm install

      - name: Run Angular Jasmine Tests
        run: |
          cd frontend
          npx ng test --watch=false --browsers=ChromeHeadless