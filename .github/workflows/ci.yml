name: Full-Stack CI Pipeline

on:
  push:
    branches:
      - master
      - feature/fullstack-monorepo
  pull_request:
    branches:
      - master
      - feature/fullstack-monorepo

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Tooling
        run: |
          cd Backend
          npm install

      - name: Run Jest Testing Suite
        run: |
          cd Backend
          npm test

  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Tooling
        run: |
          cd Frontend
          npm install

      - name: Run Angular Jasmine Tests
        run: |
          cd Frontend
          npx ng test --watch=false --browsers=ChromeHeadless